name: sec-core-rpmbuild-test

on:
  push:
  schedule:
    - cron: '0 14 * * *'  # 北京时间每天 22:00
  pull_request:
    branches:
      - 'release/agent-sec-core/**'
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: read

jobs:
  build-rpm:
    name: Build agent-sec-core RPM
    runs-on: ubuntu-22.04
    container:
      image: alibaba-cloud-linux-4-registry.cn-hangzhou.cr.aliyuncs.com/alinux4/alinux4:latest
    steps:
      - name: Configure mirrors and install dependencies
        run: |
          sed -i -e "s/cloud.aliyuncs/aliyun/g" /etc/yum.repos.d/*.repo
          dnf install -y tar git rpm-build gcc make clang llvm \
                         openssl-devel libseccomp-devel bubblewrap \
                         python3-pip

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93.0'

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.11.6'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build RPM
        run: ./scripts/rpm-build.sh agent-sec-core

      - name: List RPM contents
        run: |
          echo "=== RPM files built ==="
          find scripts/rpmbuild/RPMS -name '*.rpm' | sort
          echo ""
          for rpm in scripts/rpmbuild/RPMS/**/*.rpm; do
            echo "========================================"
            echo ">>> $rpm"
            echo "========================================"
            if [[ "$rpm" == *agent-sec-cli* ]]; then
              rpm -qip "$rpm"
              echo "--- Top-level packages in site-packages ---"
              rpm -qlp "$rpm" | grep site-packages/ | awk -F'site-packages/' '{print $2}' | awk -F'/' '{print $1}' | sort -u
            else
              rpm -qlvp "$rpm"
            fi
            echo ""
          done

      - name: Test RPM installation
        run: |
          rpm -ivh scripts/rpmbuild/RPMS/**/*.rpm
          agent-sec-cli --help

      - name: Verify all Python imports
        run: |
          SITE_PKG=$(python3 -c "import agent_sec_cli, pathlib; print(pathlib.Path(agent_sec_cli.__file__).parent)")
          echo "Package location: $SITE_PKG"

          FAILED=0
          while IFS= read -r pyfile; do
            # Convert file path to module name
            rel=${pyfile#"$SITE_PKG/"}
            mod="agent_sec_cli.${rel%.py}"
            mod=${mod//\//.}
            # Skip __init__.py → use parent module name
            mod=${mod/.__init__/}
            echo -n "Importing $mod ... "
            if python3 -c "import $mod" 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done < <(find "$SITE_PKG" -name '*.py' -not -name '__pycache__' | sort)

          if [ $FAILED -ne 0 ]; then
            echo "ERROR: $FAILED module(s) failed to import"
            exit 1
          fi
          echo "All modules imported successfully"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sec-core-rpms-${{ github.run_number }}-${{ github.sha }}
          path: scripts/rpmbuild/RPMS/**/*.rpm
          retention-days: ${{ github.event_name == 'pull_request' && 1 || 7 }}
