name: Release

on:
  push:
    tags:
      - 'cosh/v*'
      - 'sec-core/v*'
      - 'sight/v*'
      - 'skill/v*'
      - 'tokenless/v*'
      - 'ckpt/v*'

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # Step 1: Parse tag only.
  # Source/vendor/RPM artifacts are all produced by rpm.yaml below to avoid
  # duplicating package-source uploads, which would collide on artifact names
  # within the same workflow run (409 Conflict).
  # =========================================================================
  parse:
    name: Parse ${{ github.ref_name }}
    runs-on: ubuntu-22.04
    outputs:
      component: ${{ steps.parse.outputs.component }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SCOPE="${TAG%%/v*}"
          VERSION="${TAG#*/v}"

          case "$SCOPE" in
            cosh)     COMPONENT="copilot-shell" ;;
            sec-core) COMPONENT="agent-sec-core" ;;
            sight)    COMPONENT="agentsight" ;;
            skill)    COMPONENT="os-skills" ;;
            tokenless) COMPONENT="tokenless" ;;
            ckpt)     COMPONENT="ws-ckpt" ;;
            *)
              echo "Unknown scope: $SCOPE"
              exit 1
              ;;
          esac

          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "tag=$TAG"             >> $GITHUB_OUTPUT

          echo "### Parsed Tag" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`$TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`$COMPONENT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Step 2: Package source/vendor + build RPMs (amd64 + arm64).
  # rpm.yaml produces source tarball, vendor tarball, and per-arch RPMs as
  # artifacts consumed by the publish job below.
  # =========================================================================
  rpm:
    name: RPM ${{ needs.parse.outputs.tag }}
    needs: parse
    uses: ./.github/workflows/rpm.yaml
    with:
      component: ${{ needs.parse.outputs.component }}
      version: ${{ needs.parse.outputs.version }}
      artifact-suffix: ''
      retention-days: '28'
    secrets: inherit

  # =========================================================================
  # Step 3: Publish (requires manual approval via GitHub Environment)
  #
  # If reviewer rejects, no Release is created.
  # =========================================================================
  publish:
    name: Publish ${{ needs.parse.outputs.tag }}
    needs: [parse, rpm]
    environment: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download official artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.parse.outputs.component }}-${{ needs.parse.outputs.version }}
          path: /tmp/archives

      - name: Download vendor artifact (if exists)
        id: download-vendor
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.parse.outputs.component }}-${{ needs.parse.outputs.version }}-vendor
          path: /tmp/archives

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          # Single-component pattern; rpm.yaml uploads as rpm-<component>-<arch>.
          pattern: rpm-${{ needs.parse.outputs.component }}-*
          path: /tmp/rpms
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMPONENT="${{ needs.parse.outputs.component }}"
          VERSION="${{ needs.parse.outputs.version }}"
          TAG="${{ needs.parse.outputs.tag }}"
          ARCHIVE="/tmp/archives/${COMPONENT}-${VERSION}.tar.gz"

          case "$COMPONENT" in
            copilot-shell)  PREFIX="cosh/v" ;;
            agent-sec-core) PREFIX="sec-core/v" ;;
            agentsight)     PREFIX="sight/v" ;;
            os-skills)      PREFIX="skill/v" ;;
            tokenless)      PREFIX="tokenless/v" ;;
            ws-ckpt)        PREFIX="ckpt/v" ;;
          esac

          PREV_TAG=$(git tag --list "${PREFIX}*" --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${TAG}"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          NOTES="## ${COMPONENT} v${VERSION}\n\n<!-- Add release notes here -->\n\n## What's Changed\n\n<!-- List the key changes in this release -->\n\n**Full Changelog**: ${COMPARE_URL}"

          # Collect all assets to upload
          ASSETS=("$ARCHIVE")
          VENDOR_ARCHIVE="/tmp/archives/${COMPONENT}-${VERSION}-vendor.tar.gz"
          if [ -f "$VENDOR_ARCHIVE" ]; then
            ASSETS+=("$VENDOR_ARCHIVE")
          fi

          # Append all RPMs produced by the rpm job
          if [ -d /tmp/rpms ]; then
            while IFS= read -r rpm; do
              [ -n "$rpm" ] && ASSETS+=("$rpm")
            done < <(find /tmp/rpms -name '*.rpm' | sort)
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "::error::Release '$TAG' already exists."
            echo "::error::If you need to re-publish, delete the existing release first, then re-run this workflow."
            exit 1
          fi

          gh release create "$TAG" \
            --title "${COMPONENT} v${VERSION}" \
            --notes "$(printf '%b' "${NOTES}")" \
            --target "$(git rev-list -n 1 $TAG)" \
            "${ASSETS[@]}"

          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')

          echo "### Release Created" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`${COMPONENT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | [View Release](${RELEASE_URL}) |" >> $GITHUB_STEP_SUMMARY
          if [ -f "$VENDOR_ARCHIVE" ]; then
            echo "| Vendor | \`${COMPONENT}-${VERSION}-vendor.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          fi
          RPM_COUNT=$(find /tmp/rpms -name '*.rpm' 2>/dev/null | wc -l)
          if [ "$RPM_COUNT" -gt 0 ]; then
            echo "| RPMs | ${RPM_COUNT} file(s) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Changelog | [Compare](${COMPARE_URL}) |" >> $GITHUB_STEP_SUMMARY
