name: Docker Nightly

on:
  schedule:
    # UTC 20:00 = Beijing 04:00
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry-run mode: build images but do NOT push to registries"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/alibaba/anolisa

jobs:
  # ===========================================================================
  # Job 1: Calculate versions (each component independently)
  # ===========================================================================
  versions:
    name: Calculate Versions
    runs-on: ubuntu-22.04
    outputs:
      cosh-version: ${{ steps.cosh.outputs.version }}
      skill-version: ${{ steps.skill.outputs.version }}
      sec-core-ref: ${{ steps.detect-sec-core.outputs.ref }}
      sec-core-version: ${{ steps.sec-core.outputs.version }}
      tokenless-version: ${{ steps.tokenless.outputs.version }}
      image-version: ${{ steps.image.outputs.version }}
      image-version-tag: ${{ steps.image.outputs.version_tag }}
      # TODO: uncomment when component(s) is(are) ready
      # sight-version: ${{ steps.sight.outputs.version }}
      # ws-ckpt-version: ${{ steps.ws-ckpt.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Version: copilot-shell"
        id: cosh
        uses: ./.github/actions/calculate-version
        with:
          tag-match: "cosh/v*"

      - name: "Version: os-skills"
        id: skill
        uses: ./.github/actions/calculate-version
        with:
          tag-match: "skill/v*"

      - name: "Detect sec-core source ref"
        id: detect-sec-core
        shell: bash
        run: |
          set -euo pipefail

          # Ensure main is available as a remote-tracking ref for comparison.
          git fetch origin main --no-tags --quiet 2>/dev/null || true

          # Step 1: find the latest release/sec-core/v* (or release/agent-sec-core/v*) branch.
          REL_BRANCH=$(
            git branch -r --list 'origin/release/sec-core/v*' \
                         --list 'origin/release/agent-sec-core/v*' \
              | sort -V | tail -1 | tr -d ' '
          )

          if [ -z "$REL_BRANCH" ]; then
            # No release branch: development is happening on main only.
            # Use main when it has any commits under src/agent-sec-core/,
            # otherwise skip sec-core entirely.
            MAIN_TIME=$(git log -1 --format=%ct origin/main -- src/agent-sec-core/ 2>/dev/null || echo 0)
            if [ "$MAIN_TIME" -gt 0 ]; then
              echo "::notice::No release branch found; falling back to main"
              echo "ref=main" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::No release branch and no src/agent-sec-core/ on main; skipping sec-core"
              echo "ref=" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          REL_REF="${REL_BRANCH#origin/}"

          # Step 2: compare last commit time under src/agent-sec-core/ between
          # the release branch and main. The more recently updated one wins.
          # This matches the "branch management is fluid" reality for sec-core:
          # sometimes the release branch is the development baseline, sometimes main is.
          REL_TIME=$(git log -1 --format=%ct "origin/${REL_REF}" -- src/agent-sec-core/ 2>/dev/null || echo 0)
          MAIN_TIME=$(git log -1 --format=%ct origin/main -- src/agent-sec-core/ 2>/dev/null || echo 0)

          echo "src/agent-sec-core/ last touched:"
          echo "  release (${REL_REF}): ${REL_TIME}"
          echo "  main               : ${MAIN_TIME}"

          if [ "$MAIN_TIME" -gt "$REL_TIME" ]; then
            REF="main"
            echo "::notice::main is ahead of ${REL_REF} for sec-core; using main"
          else
            REF="${REL_REF}"
            echo "::notice::${REL_REF} is up-to-date for sec-core; using release branch"
          fi

          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: "Version: agent-sec-core"
        id: sec-core
        if: steps.detect-sec-core.outputs.ref != ''
        uses: ./.github/actions/calculate-version
        with:
          tag-match: "sec-core/v*"
          ref: ${{ steps.detect-sec-core.outputs.ref }}

      - name: "Version: image (os-release)"
        id: image
        uses: ./.github/actions/calculate-version
        with:
          tag-match: "os-release/v*"

      - name: "Version: tokenless"
        id: tokenless
        uses: ./.github/actions/calculate-version
        with:
          tag-match: "tokenless/v*"

      - name: Summary
        run: |
          echo "## Component Versions" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| copilot-shell | \`${{ steps.cosh.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| os-skills | \`${{ steps.skill.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-sec-core | \`${{ steps.sec-core.outputs.version || '_skipped_' }}\` (source: \`${{ steps.detect-sec-core.outputs.ref || 'none' }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| agentsight | _TODO_ |" >> $GITHUB_STEP_SUMMARY
          echo "| tokenless | \`${{ steps.tokenless.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ws-ckpt | _TODO_ |" >> $GITHUB_STEP_SUMMARY
          echo "| **image** | \`${{ steps.image.outputs.version }}\` (tag: \`${{ steps.image.outputs.version_tag }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "> **Dry-run mode**: images will be built but NOT pushed." >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Job 2: Package + Build RPM (per component)
  #
  # rpm.yaml handles both source/vendor packaging and RPM construction
  # internally, producing artifacts named rpm-{component}-{arch}.nightly.
  # ===========================================================================
  rpm-cosh:
    name: "RPM: copilot-shell"
    needs: versions
    uses: ./.github/workflows/rpm.yaml
    with:
      component: copilot-shell
      version: ${{ needs.versions.outputs.cosh-version }}
      artifact-suffix: ".nightly"
      retention-days: "7"
    secrets: inherit

  rpm-skill:
    name: "RPM: os-skills"
    needs: versions
    uses: ./.github/workflows/rpm.yaml
    with:
      component: os-skills
      version: ${{ needs.versions.outputs.skill-version }}
      artifact-suffix: ".nightly"
      retention-days: "7"
    secrets: inherit

  # TODO: uncomment when agentsight is integrated
  # rpm-sight:
  #   name: "RPM: agentsight"
  #   needs: versions
  #   uses: ./.github/workflows/rpm.yaml
  #   with:
  #     component: agentsight
  #     version: ${{ needs.versions.outputs.sight-version }}
  #     artifact-suffix: ".nightly"
  #     retention-days: "7"
  #   secrets: inherit

  rpm-sec-core:
    name: "RPM: agent-sec-core"
    needs: versions
    if: needs.versions.outputs.sec-core-ref != ''
    uses: ./.github/workflows/rpm.yaml
    with:
      component: agent-sec-core
      version: ${{ needs.versions.outputs.sec-core-version }}
      artifact-suffix: ".nightly"
      retention-days: "7"
      overlay-ref: ${{ needs.versions.outputs.sec-core-ref }}
    secrets: inherit

  rpm-tokenless:
    name: "RPM: tokenless"
    needs: versions
    uses: ./.github/workflows/rpm.yaml
    with:
      component: tokenless
      version: ${{ needs.versions.outputs.tokenless-version }}
      artifact-suffix: ".nightly"
      retention-days: "7"
    secrets: inherit

  # TODO: uncomment when ws-ckpt is integrated
  # rpm-ws-ckpt:
  #   name: "RPM: ws-ckpt"
  #   needs: versions
  #   uses: ./.github/workflows/rpm.yaml
  #   with:
  #     component: ws-ckpt
  #     version: ${{ needs.versions.outputs.ws-ckpt-version }}
  #     artifact-suffix: ".nightly"
  #     retention-days: "7"
  #   secrets: inherit

  # ===========================================================================
  # Job 3: Build and push Docker image
  # ===========================================================================
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-22.04
    needs:
      - versions
      - rpm-cosh
      - rpm-skill
      - rpm-sec-core
      - rpm-tokenless
      # TODO: uncomment when ready
      # - rpm-sight
      # - rpm-ws-ckpt
    steps:
      - uses: actions/checkout@v4

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          # Match any artifact with the 'rpm-' prefix. Avoid multi-segment
          pattern: rpm-*
          path: /tmp/rpms-raw/

      - name: Organize RPMs by architecture
        run: |
          set -euo pipefail
          mkdir -p rpms/{amd64,arm64}

          # Classify RPMs by their actual filename suffix (.x86_64 / .aarch64 / .noarch)
          # instead of relying on artifact directory names.
          # noarch RPMs are copied into BOTH arch dirs so the Dockerfile only needs
          # a single COPY per ${TARGETARCH}.
          for dir in /tmp/rpms-raw/rpm-*; do
            [ -d "$dir" ] || continue
            for rpm in "$dir"/*.rpm; do
              [ -f "$rpm" ] || continue
              name=$(basename "$rpm")
              case "$name" in
                *.x86_64.rpm)  cp "$rpm" rpms/amd64/ ;;
                *.aarch64.rpm) cp "$rpm" rpms/arm64/ ;;
                *.noarch.rpm)
                  cp "$rpm" rpms/amd64/
                  cp "$rpm" rpms/arm64/
                  ;;
                *)
                  echo "::warning::Unknown RPM architecture: $name"
                  ;;
              esac
            done
          done

          echo "=== RPMs by architecture ==="
          for arch in amd64 arm64; do
            echo "--- ${arch} ---"
            ls -la rpms/${arch}/ 2>/dev/null || echo "(empty)"
          done

          # Fail fast if either arch directory has no RPMs — otherwise the
          # Dockerfile's COPY step will fail later with a much less obvious
          # 'lstat /rpms/<arch>: no such file or directory'.
          for arch in amd64 arm64; do
            count=$(find "rpms/${arch}" -maxdepth 1 -name '*.rpm' 2>/dev/null | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "::error::No RPMs collected for ${arch}. Check the 'Download all RPM artifacts' step's filter result."
              exit 1
            fi
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name == 'schedule' || inputs.dry-run != true }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TODO: add ACR login when ready

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ needs.versions.outputs.image-version-tag }}
            type=raw,value=nightly

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.alinux
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'schedule' || inputs.dry-run != true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.versions.outputs.image-version-tag }}
          cache-from: type=gha,scope=docker-nightly
          cache-to: type=gha,scope=docker-nightly,mode=min

      - name: Summary
        run: |
          IMAGE_TAG="${{ needs.versions.outputs.image-version-tag }}"
          DRY_RUN="${{ inputs.dry-run }}"

          echo "## Docker Nightly Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$DRY_RUN" = "true" ]; then
            echo "> **Dry-run mode**: images were built but NOT pushed to registries." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### Component Versions" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| copilot-shell | \`${{ needs.versions.outputs.cosh-version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| os-skills | \`${{ needs.versions.outputs.skill-version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-sec-core | \`${{ needs.versions.outputs.sec-core-version || '_skipped_' }}\` (source: \`${{ needs.versions.outputs.sec-core-ref || 'none' }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| agentsight | _TODO_ |" >> $GITHUB_STEP_SUMMARY
          echo "| tokenless | \`${{ needs.versions.outputs.tokenless-version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ws-ckpt | _TODO_ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.GHCR_IMAGE }}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.GHCR_IMAGE }}:nightly\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms**: \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
