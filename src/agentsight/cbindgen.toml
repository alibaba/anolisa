language = "C"
header = """/*
 * AgentSight C FFI API
 *
 * Auto-generated by cbindgen — DO NOT EDIT.
 * See docs/design-docs/c-ffi-api.md for usage details.
 */"""
include_guard = "AGENTSIGHT_H"
cpp_compat = true
style = "both"
tab_width = 4
documentation_style = "c99"

#
# NOTE: two independent workarounds are in play below.
#
# (1) The function declarations in `after_includes` are HAND-MAINTAINED.
#     cbindgen 0.27 does not recognize the Rust 2024 `#[unsafe(no_mangle)]`
#     attribute and silently skips every exported function, so we paste the
#     declarations here. build.rs::check_ffi_header_drift cross-checks the
#     export NAMES on both sides and fails the build on mismatch.
#     CAVEAT: the drift guard only checks NAMES. Signature drift (return type,
#     parameter types/order/count) is NOT detected automatically — keep the
#     C signatures here in lockstep with src/ffi.rs by hand.
#
# (2) `item_types = ["structs"]` in [export] is independently required.
#     Without it, cbindgen would emit `pub const AGENTSIGHT_READ_BLOCK` (and
#     other unrelated `pub const` items from across the crate) as `#define`s
#     in the public header, duplicating the macro already written below.
#     Opaque handles are gated separately by `cbindgen:no-export` doc comments
#     in src/ffi.rs.
#
# TODO: when bumping cbindgen to a version that handles `#[unsafe(no_mangle)]`,
# drop this block AND `item_types = ["structs"]` AND build.rs's drift guard
# (it becomes dead code with a misleading panic message).
#
after_includes = """
/* Forward declarations for callback parameter types */
typedef struct AgentsightHttpsData AgentsightHttpsData;
typedef struct AgentsightLLMData   AgentsightLLMData;

/* ---- Opaque handles ---- */
typedef struct AgentsightConfigHandle AgentsightConfigHandle;
typedef struct AgentsightHandle       AgentsightHandle;

/* ---- Callback types ---- */
typedef void (*agentsight_https_callback_fn)(const AgentsightHttpsData *data, void *user_data);
typedef void (*agentsight_llm_callback_fn)(const AgentsightLLMData *data, void *user_data);

/* ---- Error handling ---- */
const char *agentsight_last_error(void);

/* ---- Configuration ---- */
AgentsightConfigHandle *agentsight_config_new(void);
void agentsight_config_set_verbose(AgentsightConfigHandle *cfg, int verbose);
void agentsight_config_set_log_path(AgentsightConfigHandle *cfg, const char *path);
void agentsight_config_add_cmdline_rule(AgentsightConfigHandle *cfg, const char *const *rule, const char *agent_name, int allow);
void agentsight_config_add_https(AgentsightConfigHandle *cfg, const char *rule);
int  agentsight_config_add_http(AgentsightConfigHandle *cfg, const char *target);
int agentsight_config_load_config(AgentsightConfigHandle *cfg, const char *json_str);
void agentsight_config_free(AgentsightConfigHandle *cfg);

/* ---- Lifecycle ---- */
AgentsightHandle *agentsight_new(AgentsightConfigHandle *cfg);
int agentsight_start(AgentsightHandle *h);
int agentsight_stop(AgentsightHandle *h);
void agentsight_free(AgentsightHandle *h);
const char *agentsight_version(void);

/* ---- Event notification ---- */
int agentsight_get_eventfd(AgentsightHandle *h);

/* ---- Data reading ---- */
#define AGENTSIGHT_READ_BLOCK 1
int agentsight_read(AgentsightHandle *h,
                    agentsight_https_callback_fn http_cb, void *http_ud,
                    agentsight_llm_callback_fn   llm_cb,  void *llm_ud,
                    int flags);
"""

[parse]
parse_deps = false
exclude = ["skill_metrics"]

[export]
include = [
    "AgentsightHttpsData",
    "AgentsightLLMData",
]
# Only export structs — constants and functions are in after_includes
item_types = ["structs"]

[enum]
rename_variants = "None"
